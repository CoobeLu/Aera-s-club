<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERA Entertainment - 陪玩小店</title>
    <style>
        :root {
            --primary-color: #ff8e8e;
            --bg-color: #ffffff;
            --text-color: #333;
            --card-bg: #fff;
            --header-bg: #ffffff;
        }

        html { overflow-y: scroll; }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- LOGO 區 --- */
        .header {
            width: 100%;
            background-color: var(--header-bg);
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 100;
        }

        .logo-img {
            height: 120px;
            width: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            filter: invert(1) contrast(1.2); 
        }

        /* --- 關於我們 --- */
        .about-section {
            width: 90%; max-width: 650px;
            margin: 40px 20px 20px 20px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .about-title { font-size: 24px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; }
        .about-text { font-size: 16px; line-height: 1.9; color: #666; }

        /* --- 價目表區塊 (新增) --- */
        .price-section {
            width: 90%; max-width: 650px;
            margin: 20px auto;
            padding: 25px;
            background: #fffafb; /* 淡淡的粉色背景 */
            border-radius: 20px;
            border: 1px dashed var(--primary-color);
            text-align: center;
        }

        .price-title { font-size: 20px; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; }
        .price-intro { font-size: 14px; color: #888; margin-bottom: 20px; }

        .price-table {
            width: 100%;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .price-item {
            background: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            flex: 1;
            min-width: 200px;
        }

        .price-label { font-size: 16px; font-weight: bold; color: #555; display: block; }
        .price-value { font-size: 22px; font-weight: 800; color: var(--primary-color); margin-top: 5px; display: block; }

        /* --- 夥伴列表 --- */
        .container { width: 100%; max-width: 1200px; padding: 20px 20px 60px 20px; box-sizing: border-box; }
        .section-title { font-size: 20px; margin-bottom: 25px; padding-left: 12px; border-left: 6px solid var(--primary-color); font-weight: bold; }

        .scroller-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 15px 0; -webkit-overflow-scrolling: touch; }

        .player-card {
            display: inline-block; width: 190px; margin-right: 20px;
            background-color: var(--card-bg); border-radius: 18px;
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease; vertical-align: top; cursor: pointer;
        }
        .player-card:hover { transform: translateY(-7px); box-shadow: 0 10px 30px rgba(0,0,0,0.12); }

        .player-img-container { width: 100%; height: 190px; background-color: #f8f8f8; }
        .player-img { width: 100%; height: 100%; object-fit: cover; }

        .player-info { padding: 18px; text-align: center; }
        .player-name { font-size: 19px; font-weight: bold; margin-bottom: 10px; }
        .player-tag { font-size: 12px; color: white; background: var(--primary-color); padding: 4px 12px; border-radius: 20px; white-space: normal; display: inline-block; line-height: 1.4; }

        /* --- 彈出視窗 --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.show { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background-color: #fff; width: 85%; max-width: 380px; border-radius: 28px; padding: 35px; position: relative; text-align: center; animation: popUp 0.3s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-modal { position: absolute; top: 18px; right: 22px; font-size: 30px; color: #ccc; cursor: pointer; }
        .modal-header img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary-color); object-fit: cover; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .modal-body { text-align: left; margin-bottom: 30px; }
        .info-label { font-weight: bold; color: var(--primary-color); margin-top: 15px; display: block; font-size: 16px; }
        .info-content { font-size: 15px; line-height: 1.7; color: #555; margin: 5px 0 0 0; }
        
        .contact-btn { display: block; width: 100%; padding: 16px 0; background: linear-gradient(135deg, #ff8e8e 0%, #ff6b6b 100%); color: white; text-align: center; text-decoration: none; border-radius: 14px; font-weight: bold; font-size: 16px; box-shadow: 0 5px 15px rgba(255,107,107,0.4); }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" class="logo-img" alt="AERA LOGO">
    </header>

    <div class="about-section">
        <div class="about-title">✨ AERA 祕密基地 ✨</div>
        <div class="about-text">
            在這裡，我們不只陪你打遊戲，更想陪你度過每一個心情起伏。<br>
            讓陪伴，成為你生活中最溫暖的日常。
        </div>
    </div>

    <div class="price-section">
        <div class="price-title">💎 服務價目表</div>
        <p class="price-intro">我們提供多樣化的陪玩選擇，給您最優質的陪伴時光</p>
        <div class="price-table">
            <div class="price-item">
                <span class="price-label">🌸 頭牌藝妓</span>
                <span class="price-value">500c / 小時</span>
            </div>
            <div class="price-item">
                <span class="price-label">💼 一般職員</span>
                <span class="price-value">150c / 小時</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">我們的陪玩夥伴</div>
        <div class="scroller-wrapper">
            
            <div class="player-card" onclick="openModal('澤謙老闆娘', '性格爽朗天真，聲音萌萌的。上至打牌陪玩，下至牽線一手包辦！', 'Line ID: zeqian_boss', 'zeqian.png')">
                <div class="player-img-container">
                    <img src="zeqian.png" class="player-img" alt="澤謙老闆娘" onerror="this.src='https://via.placeholder.com/190?text=Boss'">
                </div>
                <div class="player-info">
                    <div class="player-name">澤謙老闆娘</div>
                    <span class="player-tag">王牌藝妓：打牌牽線全能</span>
                </div>
            </div>

            <div class="player-card" onclick="openModal('提拉米蘇', '聲音可愛又純真無邪，擅長各種射擊與合作遊戲，陪你度過歡樂時光。', 'Line ID: tira_123', 'tilamisu.png')">
                <div class="player-img-container">
                    <img src="tilamisu.png" class="player-img" alt="提拉米蘇" onerror="this.src='https://via.placeholder.com/190?text=Tiramisu'">
                </div>
                <div class="player-info">
                    <div class="player-name">提拉米蘇</div>
                    <span class="player-tag">活潑甜心：聲音純真可愛</span>
                </div>
            </div>
            
            <div class="player-card" onclick="openModal('亞伯', '大佬陪你暢遊異世界！技術流代表，專業帶飛不掉分。', 'Discord: Abel#999', 'yabo.png')">
                <div class="player-img-container">
                    <img src="yabo.png" class="player-img" alt="亞伯" onerror="this.src='https://via.placeholder.com/190?text=Abel'">
                </div>
                <div class="player-info">
                    <div class="player-name">亞伯</div>
                    <span class="player-tag">技術大佬：專業帶飛穩贏</span>
                </div>
            </div>
            
            <div class="player-card" onclick="openModal('稀飯', '療癒暖男，聲音性感。最溫柔的傾聽者，陪你聊心也陪你打怪。', '微信: xifan_play', 'sivan.png')">
                <div class="player-img-container">
                    <img src="sivan.png" class="player-img" alt="稀飯" onerror="this.src='https://via.placeholder.com/190?text=Rice'">
                </div>
                <div class="player-info">
                    <div class="player-name">稀飯</div>
                    <span class="player-tag">療癒暖男：溫柔性感聲音</span>
                </div>
            </div>

        </div>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div class="modal-header">
                <img src="" id="modalImg" alt="頭像">
                <h2 id="modalName" style="margin: 0; font-size: 24px;"></h2>
            </div>
            <div class="modal-body">
                <span class="info-label">關於我 / 性格：</span>
                <p id="modalDesc" class="info-content"></p>
                <span class="info-label">聯絡方式：</span>
                <p id="modalContact" class="info-content"></p>
            </div>
            <a href="#" class="contact-btn">立即預約聯絡</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const modalContact = document.getElementById('modalContact');
        const modalImg = document.getElementById('modalImg');

        function openModal(name, desc, contact, imgUrl) {
            modalName.innerText = name;
            modalDesc.innerText = desc;
            modalContact.innerText = contact;
            modalImg.src = imgUrl; 
            modal.classList.add('show');
            document.documentElement.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.documentElement.style.overflow = '';
        }

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
