<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERA Entertainment</title>
    <style>
        :root {
            --primary-color: #ff8e8e;
            --bg-color: #ffffff; /* 全部改為純白 */
            --text-color: #333;
            --card-bg: #fff;
            --header-bg: #ffffff; /* Header 改為純白 */
        }

        html { overflow-y: scroll; }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- LOGO 區 (徹底解決色差) --- */
        .header {
            width: 100%;
            background-color: var(--header-bg);
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #eee; /* 用一條淡淡的線區隔 */
            position: sticky; top: 0; z-index: 100;
        }

        .logo-img {
            height: 120px;
            width: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            /* 關鍵：使用 invert(1) 將原本黑底白字的圖片 反轉成 白底黑字 */
            /* 這樣你的 LOGO 就會變成帥氣的黑字，且完全融入白色背景 */
            filter: invert(1) contrast(1.2); 
        }

        /* --- 關於我們 --- */
        .about-section {
            width: 90%; max-width: 650px;
            margin: 40px 20px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* 柔和陰影 */
        }

        .about-title { font-size: 24px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; }
        .about-text { font-size: 16px; line-height: 1.9; color: #666; }

        /* --- 夥伴列表 --- */
        .container { width: 100%; max-width: 1200px; padding: 0 20px 60px 20px; box-sizing: border-box; }
        .section-title { font-size: 20px; margin-bottom: 25px; padding-left: 12px; border-left: 6px solid var(--primary-color); font-weight: bold; }

        .scroller-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 15px 0; -webkit-overflow-scrolling: touch; }

        .player-card {
            display: inline-block; width: 190px; margin-right: 25px;
            background-color: var(--card-bg); border-radius: 18px;
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease; vertical-align: top; cursor: pointer;
        }
        .player-card:hover { transform: translateY(-7px); }

        .player-img-container { width: 100%; height: 190px; background-color: #f8f8f8; }
        .player-img { width: 100%; height: 100%; object-fit: cover; }

        .player-info { padding: 18px; text-align: center; }
        .player-name { font-size: 19px; font-weight: bold; margin-bottom: 10px; }
        .player-tag { font-size: 12px; color: white; background: var(--primary-color); padding: 4px 12px; border-radius: 20px; }

        /* --- 彈出視窗 --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content { background-color: #fff; width: 85%; max-width: 380px; border-radius: 28px; padding: 35px; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 18px; right: 22px; font-size: 30px; color: #ccc; cursor: pointer; }
        .contact-btn { display: block; width: 100%; padding: 16px 0; background: var(--primary-color); color: white; text-align: center; text-decoration: none; border-radius: 14px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" class="logo-img" alt="AERA LOGO">
    </header>

    <div class="about-section">
        <div class="about-title">✨ AERA 祕密基地 ✨</div>
        <div class="about-text">
            我們不只陪你打遊戲，更想陪你度過每一個心情起伏。<br>
            讓陪伴，成為你生活中最溫暖的日常。
        </div>
    </div>

    <div class="container">
        <div class="section-title">我們的陪玩夥伴</div>
        <div class="scroller-wrapper">
            <div class="player-card" onclick="openModal('提拉米蘇', '聲音可愛又純真無邪，擅長各種射擊遊戲。', 'Line ID: tira_123', 'tira.jpg')">
                <div class="player-img-container"><img src="tira.jpg" class="player-img" alt="提拉米蘇" onerror="this.src='https://via.placeholder.com/190?text=Tiramisu'"></div>
                <div class="player-info"><div class="player-name">提拉米蘇</div><span class="player-tag">活潑甜心</span></div>
            </div>
            <div class="player-card" onclick="openModal('亞伯', '大佬陪你暢遊異世界！技術流代表，專業帶飛。', 'Discord: Abel#999', 'abel.jpg')">
                <div class="player-img-container"><img src="abel.jpg" class="player-img" alt="亞伯" onerror="this.src='https://via.placeholder.com/190?text=Abel'"></div>
                <div class="player-info"><div class="player-name">亞伯</div><span class="player-tag">技術大佬</span></div>
            </div>
            <div class="player-card" onclick="openModal('稀飯', '療癒暖男，聲音性感。最溫柔的傾聽者。', '微信: xifan_play', 'rice.jpg')">
                <div class="player-img-container"><img src="rice.jpg" class="player-img" alt="稀飯" onerror="this.src='https://via.placeholder.com/190?text=Rice'"></div>
                <div class="player-info"><div class="player-name">稀飯</div><span class="player-tag">療癒暖男</span></div>
            </div>
        </div>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div class="modal-header">
                <img src="" id="modalImg" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary-color);">
                <h2 id="modalName"></h2>
            </div>
            <div class="modal-body" style="text-align: left;">
                <p><strong>關於我：</strong></p>
                <p id="modalDesc"></p>
                <p><strong>聯絡方式：</strong></p>
                <p id="modalContact"></p>
            </div>
            <a href="#" class="contact-btn">立即預約聯絡</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const modalContact = document.getElementById('modalContact');
        const modalImg = document.getElementById('modalImg');

        function openModal(name, desc, contact, imgUrl) {
            modalName.innerText = name;
            modalDesc.innerText = desc;
            modalContact.innerText = contact;
            modalImg.src = imgUrl; 
            modal.classList.add('show');
            document.documentElement.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.documentElement.style.overflow = '';
        }

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
