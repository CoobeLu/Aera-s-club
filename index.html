<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的陪玩小店</title>
    <style>
        :root {
            --primary-color: #ff8e8e; /* 柔和的粉紅色，用於點綴 */
            --bg-color: #fcfcfd;    /* 整體背景使用非常淡的灰色，讓白色區塊更突出 */
            --text-color: #444;      /* 主要文字顏色 */
            --card-bg: #fff;        /* 卡片背景顏色 */
        }

        /* 修正抖動：讓網頁永遠預留捲軸空間，或是平滑鎖定 */
        html {
            overflow-y: scroll; 
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- LOGO 區 (修正白色透明 LOGO 看不見的問題) --- */
        .header {
            width: 100%;
            /* 這裡是關鍵！將背景改為深灰色/黑色 */
            background-color: #2c3e50; /* 如果你想要純黑，可以用 #000000 */
            padding: 30px 0; /* 加一點填充，讓 LOGO 看起來更大氣 */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); /* 加強陰影，更有層次 */
            position: sticky; top: 0; z-index: 100;
        }

        .logo-img {
            height: 70px; /* 根據需要調整 LOGO 的顯示高度 */
            width: auto;
            object-fit: contain;
            /* 圖片本身是透明底白字，所以不需要其他 filter */
        }

        /* --- 關於我們 --- */
        .about-section {
            width: 90%; max-width: 650px;
            margin: 40px 20px 20px 20px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 6px 25px rgba(0,0,0,0.05); /* 優化陰影 */
            border: 1px solid #f0f0f0;
        }

        .about-title {
            font-size: 24px; font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .about-text {
            font-size: 16px; line-height: 1.9; color: #666;
            margin: 0;
        }

        /* --- 陪玩卡片區塊 --- */
        .container { width: 100%; max-width: 1200px; padding: 10px 20px 60px 20px; box-sizing: border-box; }
        .section-title {
            font-size: 20px; margin-bottom: 25px;
            padding-left: 12px;
            border-left: 6px solid var(--primary-color);
            font-weight: bold;
            color: #333;
        }

        .scroller-wrapper {
            width: 100%; overflow-x: auto; white-space: nowrap; padding: 15px 0;
            -webkit-overflow-scrolling: touch;
        }

        .player-card {
            display: inline-block; width: 190px; margin-right: 25px;
            background-color: var(--card-bg); border-radius: 18px;
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease; vertical-align: top; cursor: pointer;
            border: 1px solid #eee;
        }
        .player-card:hover { transform: translateY(-7px); box-shadow: 0 10px 30px rgba(0,0,0,0.12); }

        .player-img-container { width: 100%; height: 190px; background-color: #eee; }
        .player-img { width: 100%; height: 100%; object-fit: cover; }

        .player-info { padding: 18px; text-align: center; }
        .player-name { font-size: 19px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .player-tag {
            font-size: 12px; color: white;
            background: linear-gradient(135deg, #ff9e9e 0%, #ff8e8e 100%);
            padding: 4px 12px; border-radius: 20px;
            box-shadow: 0 2px 5px rgba(255,142,142,0.3);
        }

        /* --- 彈出視窗 --- */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.75);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.show { display: flex; animation: fadeIn 0.3s; }

        .modal-content {
            background-color: var(--card-bg);
            width: 85%; max-width: 380px;
            border-radius: 28px; padding: 35px;
            position: relative; text-align: center;
            animation: popUp 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-modal { position: absolute; top: 18px; right: 22px; font-size: 30px; color: #ccc; cursor: pointer; transition: color 0.2s; }
        .close-modal:hover { color: #888; }
        .modal-header img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid var(--primary-color); object-fit: cover;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .modal-body { text-align: left; margin-bottom: 30px; }
        .info-label { font-weight: bold; color: var(--primary-color); margin-top: 18px; display: block; font-size: 16px; }
        .info-content { font-size: 15px; line-height: 1.7; color: #555; margin: 5px 0 0 0; }
        .contact-btn {
            display: block; width: 100%; padding: 16px 0;
            background: linear-gradient(135deg, #ff8e8e 0%, #ff6b6b 100%);
            color: white; text-align: center; text-decoration: none;
            border-radius: 14px; font-weight: bold; font-size: 16px;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            transition: transform 0.2s;
        }
        .contact-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.webp" class="logo-img" alt="店鋪LOGO">
    </header>

    <div class="about-section">
        <div class="about-title">
            <span>✨</span>
            <span>關於我們的祕密基地</span>
            <span>✨</span>
        </div>
        <div class="about-text">
            在這裡，我們不只陪你打遊戲，更想陪你度過每一個心情起伏。<br>
            不論是想在戰場上大殺四方，還是只想找個聲音好聽的人聊聊日常，<br>
            <strong>提拉米蘇、亞伯與稀飯</strong> 都在這裡等著你。<br>
            讓陪伴，成為你生活中最溫暖的日常。
        </div>
    </div>

    <div class="container">
        <div class="section-title">我們的陪玩夥伴</div>
        <div class="scroller-wrapper">
            <div class="player-card" onclick="openModal('提拉米蘇', '性格開朗、聲音甜美，擅長各種射擊遊戲。', 'Line ID: tira_123', 'tira.jpg')">
                <div class="player-img-container"><img src="tira.jpg" class="player-img" alt="提拉米蘇" onerror="this.src='https://via.placeholder.com/190?text=Tiramisu'"></div>
                <div class="player-info"><div class="player-name">提拉米蘇</div><span class="player-tag">活潑甜心</span></div>
            </div>
            <div class="player-card" onclick="openModal('亞伯', '冷靜技術流，專業帶飛，不論什麼局都能Carry。', 'Discord: Abel#999', 'abel.jpg')">
                <div class="player-img-container"><img src="abel.jpg" class="player-img" alt="亞伯" onerror="this.src='https://via.placeholder.com/190?text=Abel'"></div>
                <div class="player-info"><div class="player-name">亞伯</div><span class="player-tag">技術大佬</span></div>
            </div>
            <div class="player-card" onclick="openModal('稀飯', '溫柔傾聽者，不管是心事還是遊戲都能陪你。', '微信: xifan_play', 'rice.jpg')">
                <div class="player-img-container"><img src="rice.jpg" class="player-img" alt="稀飯" onerror="this.src='https://via.placeholder.com/190?text=Rice'"></div>
                <div class="player-info"><div class="player-name">稀飯</div><span class="player-tag">療癒暖男</span></div>
            </div>
        </div>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div class="modal-header">
                <img src="" id="modalImg" alt="頭像">
                <h2 id="modalName" style="margin: 0; font-size: 24px;"></h2>
            </div>
            <div class="modal-body">
                <span class="info-label">關於我 / 性格：</span>
                <p id="modalDesc" class="info-content"></p>
                <span class="info-label">聯絡方式：</span>
                <p id="modalContact" class="info-content"></p>
            </div>
            <a href="#" class="contact-btn">立即預約聯絡</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const modalContact = document.getElementById('modalContact');
        const modalImg = document.getElementById('modalImg');

        function openModal(name, desc, contact, imgUrl) {
            modalName.innerText = name;
            modalDesc.innerText = desc;
            modalContact.innerText = contact;
            modalImg.src = imgUrl; 
            modal.classList.add('show');
            // 修正抖動：改用 overflow 隱藏但不位移
            document.documentElement.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.documentElement.style.overflow = '';
        }

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
