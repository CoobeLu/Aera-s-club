<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的陪玩小店</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #f9f9f9;
            --text-color: #333;
            --card-bg: #fff;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGO 區 --- */
        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img {
            height: 60px; /* 你可以根據圖片比例調整高度 */
            width: auto;
            object-fit: contain;
        }

        /* --- 關於我們介紹區 --- */
        .about-section {
            width: 90%;
            max-width: 800px;
            margin: 30px 0 10px 0;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .about-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .about-text {
            font-size: 15px;
            line-height: 1.8;
            color: #666;
        }
