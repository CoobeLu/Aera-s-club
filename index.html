<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERA Entertainment - 陪玩小店</title>
    <style>
        :root {
            --primary-color: #ff8e8e;
            --bg-color: #fcfcfd;
            --text-color: #444;
            --card-bg: #fff;
            /* 修正 LOGO 背景色：設定為與圖片完全一致的黑色 */
            --header-bg: #000000; 
        }

        html { overflow-y: scroll; }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- LOGO 區 (已放大) --- */
        .header {
            width: 100%;
            background-color: var(--header-bg);
            /* 縮減上下填充，讓放大後的 LOGO 看起來更平衡 */
            padding: 10px 0; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* 加強陰影，更有質感 */
            position: sticky; top: 0; z-index: 100;
        }

        .logo-img {
            /* --- 核心修改：LOGO 放大 --- */
            height: 250px; /* 原為 70px */
            width: auto;
            object-fit: contain;
            display: block; /* 修正對齊問題 */
            margin: 0 auto;
        }

        /* --- 關於我們 --- */
        .about-section {
            width: 90%; max-width: 650px;
            margin: 40px 20px 20px 20px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 6px 25px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        .about-title {
            font-size: 24px; font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .about-text {
            font-size: 16px; line-height: 1.9; color: #666;
        }

        /* --- 夥伴列表 --- */
        .container { width: 100%; max-width: 1200px; padding: 10px 20px 60px 20px; box-sizing: border-box; }
        .section-title {
            font-size: 20px; margin-bottom: 25px;
            padding-left: 12px;
            border-left: 6px solid var(--primary-color);
            font-weight: bold;
        }

        .scroller-wrapper {
            width: 100%; overflow-x: auto; white-space: nowrap; padding: 15px 0;
            -webkit-overflow-scrolling: touch;
        }

        .player-card {
            display: inline-block; width: 190px; margin-right: 25px;
            background-color: var(--card-bg); border-radius: 18px;
            overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease; vertical-align: top; cursor: pointer;
            border: 1px solid #eee;
        }

        .player-card:hover { transform: translateY(-7px); }

        .player-img-container { width: 100%; height: 190px; background-color: #eee; }
        .player-img { width: 100%; height: 100%; object-fit: cover; }

        .player-info { padding: 18px; text-align: center; }
        .player-name { font-size: 19px; font-weight: bold; margin-bottom: 10px; }
        .player-tag {
            font-size: 12px; color: white;
            background: linear-gradient(135deg, #ff9e9e 0%, #ff8e8e 100%);
            padding: 4px 12px; border-radius: 20px;
        }

        /* --- 彈出視窗 --- */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.75);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.show { display: flex; }

        .modal-content {
            background-color: var(--card-bg);
            width: 85%; max-width: 380px;
            border-radius: 28px; padding: 35px;
            position: relative; text-align: center;
            animation: popUp 0.3s ease-out;
        }

        @keyframes popUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-modal { position: absolute; top: 18px; right: 22px; font-size: 30px; color: #ccc; cursor: pointer; }
        .modal-header img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; margin-bottom: 20px; }
        .modal-body { text-align: left; margin-bottom: 30px; }
        .info-label { font-weight: bold; color: var(--primary-color); margin-top: 18px; display: block; }
        .info-content { font-size: 15px; line-height: 1.7; color: #555; margin-top: 5px; }
        .contact-btn {
            display: block; width: 100%; padding: 16px 0;
            background: linear-gradient(135deg, #ff8e8e 0%, #ff6b6b 100%);
            color: white; text-align: center; text-decoration: none;
            border-radius: 14px; font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" class="logo-img" alt="AERA LOGO">
    </header>

    <div class="about-section">
        <div class="about-title">✨ 關於 AERA 祕密基地 ✨</div>
        <div class="about-text">
            在這裡，我們不只陪你打遊戲，更想陪你度過每一個心情起伏。<br>
            不論是想在戰場上大殺四方，還是只想找個聲音好聽的人聊聊日常，<br>
            <strong>提拉米蘇、亞伯與稀飯</strong> 都在這裡等著你。<br>
            讓陪伴，成為你生活中最溫暖的日常。
        </div>
    </div>

    <div class="container">
        <div class="section-title">我們的陪玩夥伴</div>
        <div class="scroller-wrapper">
            <div class="player-card" onclick="openModal('提拉米蘇', '聲音可愛又純真無邪，擅長各種射擊與合作遊戲，陪你度過歡樂時光。', 'Line ID: tira_123', 'tira.jpg')">
                <div class="player-img-container"><img src="tira.jpg" class="player-img" alt="提拉米蘇" onerror="this.src='https://via.placeholder.com/190?text=Tiramisu'"></div>
                <div class="player-info"><div class="player-name">提拉米蘇</div><span class="player-tag">聲音可愛又純真無邪</span></div>
            </div>
            <div class="player-card" onclick="openModal('亞伯', '大佬陪你暢遊異世界！技術流代表，專業帶飛不掉分。', 'Discord: Abel#999', 'abel.jpg')">
                <div class="player-img-container"><img src="abel.jpg" class="player-img" alt="亞伯" onerror="this.src='https://via.placeholder.com/190?text=Abel'"></div>
                <div class="player-info"><div class="player-name">亞伯</div><span class="player-tag">大佬陪你暢遊異世界</span></div>
            </div>
            <div class="player-card" onclick="openModal('稀飯', '療癒暖男，聲音性感。最溫柔的傾聽者，陪你聊心也陪你打怪。', '微信: xifan_play', 'rice.jpg')">
                <div class="player-img-container"><img src="rice.jpg" class="player-img" alt="稀飯" onerror="this.src='https://via.placeholder.com/190?text=Rice'"></div>
                <div class="player-info"><div class="player-name">稀飯</div><span class="player-tag">療癒暖男，聲音性感</span></div>
            </div>
        </div>
    </div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div class="modal-header">
                <img src="" id="modalImg" alt="頭像">
                <h2 id="modalName" style="margin: 0;"></h2>
            </div>
            <div class="modal-body">
                <span class="info-label">關於我 / 性格：</span>
                <p id="modalDesc" class="info-content"></p>
                <span class="info-label">聯絡方式：</span>
                <p id="modalContact" class="info-content"></p>
            </div>
            <a href="#" class="contact-btn">立即預約聯絡</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const modalName = document.getElementById('modalName');
        const modalDesc = document.getElementById('modalDesc');
        const modalContact = document.getElementById('modalContact');
        const modalImg = document.getElementById('modalImg');

        function openModal(name, desc, contact, imgUrl) {
            modalName.innerText = name;
            modalDesc.innerText = desc;
            modalContact.innerText = contact;
            modalImg.src = imgUrl; 
            modal.classList.add('show');
            document.documentElement.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.documentElement.style.overflow = '';
        }

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
